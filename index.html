st personalSignBox=document.querySelector(".box6");const personalSignButton=document.querySelector(".last button:first-child");personalSignBox.addEventListener("click",()=>{toggleLhIcon()});personalSignButton.addEventListener("click",()=>{toggleLhIcon()})}function updatePersonalSignDisplay(personalSign){const signInfoElement=document.querySelector(".box6 div p");if(personalSign){signInfoElement.textContent=personalSign}else{signInfoElement.textContent="编辑个签，展示我的独特态度"}}function initDynamicIconSelectionEvents(){const radioButtons=document.querySelectorAll('input[name="dynamicIconSelect"]');radioButtons.forEach((radio)=>{radio.addEventListener("change",()=>{if(radio.checked){const selectedIcon=radio.value;updateDynamicIconDisplay(selectedIcon)}})})}function updateDynamicIconDisplay(iconSrc){const dynamicIconImg=document.getElementById("dynamicIcon");if(dynamicIconImg){dynamicIconImg.src=iconSrc}}function initEnergyIconSelectionEvents(){const radioButtons=document.querySelectorAll('input[name="energyIconSelect"]');radioButtons.forEach((radio)=>{radio.addEventListener("change",()=>{if(radio.checked){const selectedIcon=radio.value;updateEnergyIconDisplay(selectedIcon)}})})}function updateEnergyIconDisplay(iconSrc){const energyIconImg=document.getElementById("energyIcon");if(energyIconImg){energyIconImg.src=iconSrc}}function initLevelIconStyleEvents(){const styleRadios=document.querySelectorAll('input[name="levelIconStyle"]');styleRadios.forEach((radio)=>{radio.addEventListener("change",()=>{if(radio.checked){const selectedStyle=radio.value;const levelInput=document.getElementById("levelInput");const level=levelInput.value?parseInt(levelInput.value):1;updateLevelIcons(level,selectedStyle)}})})}function initEditFormEvents(){const editButton=document.getElementById("editButton");const modal=document.getElementById("editModal");const closeButton=document.querySelector(".close");const editForm=document.getElementById("editForm");editButton.addEventListener("click",()=>{modal.style.display="block";populateEditForm()});closeButton.addEventListener("click",()=>{modal.style.display="none"});window.addEventListener("click",(event)=>{if(event.target===modal){modal.style.display="none"}});editForm.addEventListener("submit",handleFormSubmit);const saveButton=editForm.querySelector('input[type="submit"]');if(saveButton){saveButton.addEventListener('click',()=>{modal.style.display="none"})}}function populateEditForm(){const userData={avatar:null,name:document.getElementById("name").textContent||"孤光",good:document.getElementById("good").textContent||"88",qqNumber:document.getElementById("qq_number").textContent||"hygg3795",gender:document.getElementById("gender").textContent||"男",age:document.getElementById("age").textContent||"",province:document.getElementById("province").textContent||"福建",city:document.getElementById("city").textContent||"福州",personalSign:"",qqLevel:"8",levelIconStyle:"1",selectedDynamicIcon:document.getElementById("dynamicIcon").src||"./img/9.gif",selectedImage:"img1",lhIcon:document.getElementById("img19").src||"./img/35.png",selectedEnergyIcon:document.getElementById("energyIcon").src||"./img/33.png",showBox7:document.querySelector('.box.box7').style.display!=='none'};if(userData.name)document.getElementById("nameInput").value=userData.name;if(userData.good)document.getElementById("goodInput").value=userData.good;if(userData.qqNumber)document.getElementById("qqNumberInput").value=userData.qqNumber;if(userData.gender)document.getElementById("genderInput").value=userData.gender;if(userData.age)document.getElementById("ageInput").value=userData.age;if(userData.province)document.getElementById("provinceInput").value=userData.province;if(userData.city)document.getElementById("cityInput").value=userData.city;if(userData.personalSign)document.getElementById("personalSignInput").value=userData.personalSign;if(userData.qqLevel)document.getElementById("levelInput").value=userData.qqLevel;const styleRadio=document.getElementById(`styleRadio${userData.levelIconStyle}`);if(styleRadio)styleRadio.checked=true;const dynamicIconRadio=document.querySelector(`input[name="dynamicIconSelect"][value="${userData.selectedDynamicIcon}"]`);if(dynamicIconRadio)dynamicIconRadio.checked=true;const vipImageRadio=document.getElementById(`${userData.selectedImage}Radio`);if(vipImageRadio)vipImageRadio.checked=true;document.getElementById('vipIconDisplayMode').value=vipIconState.displayMode;document.querySelectorAll('#vip-icon-checkboxes input[type="checkbox"]').forEach(cb=>{const iconId=cb.dataset.iconId;const isVisible=vipIconState.visible.includes(iconId);cb.checked=isVisible;if(isVisible){cb.parentElement.classList.add('checked')}else{cb.parentElement.classList.remove('checked')}});setVipBadgeCheckboxes();const energyIconRadio=document.querySelector(`input[name="energyIconSelect"][value="${userData.selectedEnergyIcon}"]`);if(energyIconRadio)energyIconRadio.checked=true;const showBox7Checkbox=document.getElementById('showBox7');if(showBox7Checkbox)showBox7Checkbox.checked=userData.showBox7}function handleFormSubmit(event){event.preventDefault();const formData={avatarInput:document.getElementById("avatarInput"),nameInput:document.getElementById("nameInput"),goodInput:document.getElementById("goodInput"),qqNumberInput:document.getElementById("qqNumberInput"),genderInput:document.getElementById("genderInput"),ageInput:document.getElementById("ageInput"),provinceInput:document.getElementById("provinceInput"),cityInput:document.getElementById("cityInput"),personalSignInput:document.getElementById("personalSignInput"),levelInput:document.getElementById("levelInput")};if(formData.avatarInput.files.length>0){const reader=new FileReader();reader.onload=(e)=>{const avatar=e.target.result;document.getElementById("avatar").src=avatar};reader.readAsDataURL(formData.avatarInput.files[0])}let hasStories=false;for(let i=1;i<=4;i++){const input=document.getElementById(`storyImageInput${i}`);if(input&&input.files.length>0){hasStories=true;const reader=new FileReader();const imageId=`storyImage${i}`;reader.onload=(e)=>{const imageData=e.target.result;const imgElement=document.getElementById(imageId);if(imgElement){imgElement.src=imageData;imgElement.parentElement.classList.add('has-image')}};reader.readAsDataURL(input.files[0])}}const storyContainer=document.querySelector('.story-container');if(storyContainer){if(hasStories){storyContainer.classList.add('has-stories')}else{storyContainer.classList.remove('has-stories')}}const userData={name:formData.nameInput.value,good:formData.goodInput.value,qqNumber:formData.qqNumberInput.value,gender:formData.genderInput.value,age:formData.ageInput.value,province:formData.provinceInput.value,city:formData.cityInput.value,personalSign:formData.personalSignInput.value};document.getElementById("name").textContent=userData.name;document.getElementById("good").textContent=userData.good;document.getElementById("qq_number").textContent=userData.qqNumber;document.getElementById("gender").textContent=userData.gender||"";document.getElementById("age").textContent=userData.age||"";document.getElementById("province").textContent=userData.province||"";document.getElementById("city").textContent=userData.city||"";updatePersonalSignDisplay(userData.personalSign);const level=formData.levelInput.value;const selectedStyle=document.querySelector('input[name="levelIconStyle"]:checked').value;if(level){const levelNum=parseInt(level);updateLevelIcons(levelNum,selectedStyle)}vipIconState.displayMode=document.getElementById('vipIconDisplayMode').value;updateVipIconsDisplay();const selectedDynamicIcon=document.querySelector('input[name="dynamicIconSelect"]:checked').value;updateDynamicIconDisplay(selectedDynamicIcon);const selectedImage=document.querySelector('input[name="imageSelect"]:checked').value;updateVipBadgesDisplay();const lhIcon=document.getElementById("img19").src;applyLhStyle(lhIcon);const selectedEnergyIcon=document.querySelector('input[name="energyIconSelect"]:checked').value;updateEnergyIconDisplay(selectedEnergyIcon);const showBox7=document.getElementById('showBox7').checked;updateBox7Visibility(showBox7);document.getElementById("editModal").style.display="none"}function updateLevelIcons(level,styleNum="1"){const container=document.getElementById("levelIconContainer");if(!container){console.error("找不到等级图标容器!");return}container.innerHTML="";let remainingLevel=level;const crownCount=Math.floor(remainingLevel/64);remainingLevel%=64;const sunCount=Math.floor(remainingLevel/16);remainingLevel%=16;const moonCount=Math.floor(remainingLevel/4);remainingLevel%=4;const starCount=remainingLevel;const styleSuffix=styleNum==="1"?"":styleNum;try{for(let i=0;i<crownCount;i++){addIcon(container,`./img/crown${styleSuffix}.png`,"皇冠(64)")}for(let i=0;i<sunCount;i++){addIcon(container,`./img/sun${styleSuffix}.png`,"太阳(16)")}for(let i=0;i<moonCount;i++){addIcon(container,`./img/moon${styleSuffix}.png`,"月亮(4)")}for(let i=0;i<starCount;i++){addIcon(container,`./img/star${styleSuffix}.png`,"星星(1)")}}catch(error){console.error("添加图标时出错:",error)}}function addIcon(container,src,alt){const wrapper=document.createElement("span");wrapper.style.marginRight="0";wrapper.style.display="inline-block";wrapper.style.fontSize="0";const img=document.createElement("img");img.src=src;img.alt=alt;img.style.height="16px";img.style.width="16px";img.style.padding="0";img.style.verticalAlign="middle";img.style.display="inline-block";img.style.border="0";img.style.lineHeight="1";img.style.fontSize="0";img.draggable=false;wrapper.appendChild(img);container.appendChild(wrapper)}function initAreaVisibilityEvents(){const showBox7Checkbox=document.getElementById('showBox7');if(showBox7Checkbox){showBox7Checkbox.addEventListener('change',()=>{updateBox7Visibility(showBox7Checkbox.checked)})}}function updateBox7Visibility(isVisible){const box7Element=document.querySelector('.box.box7');if(box7Element){box7Element.style.display=isVisible?'flex':'none'}}function initEditProfileButtonEvents(){const editProfileButton=document.querySelector(".last button:nth-child(2)");if(editProfileButton){editProfileButton.addEventListener('click',()=>{window.location.href='index2.html'})}}</script><script>function toggleLhIcon(){const img=document.getElementById("img19");if(!img)return;const fileName=img.src.split("/").pop().split("?")[0];let next;if(fileName==="35.2.png"){next="./img/35.png"}else{next="./img/35.2.png"}img.src=next;applyLhStyle(next)}function applyLhStyle(src){const pEle=document.querySelector(".box3 p");if(!pEle)return;if(src.includes("35.2.png")){pEle.style.height="15px";pEle.style.lineHeight="15px";pEle.style.background="linear-gradient(to right, #454545, #303030)";pEle.style.border="0";pEle.style.color="#F8D49C";pEle.style.fontWeight="400";pEle.style.padding="0.01rem 0.3rem 0.3rem 0.1rem";pEle.style.borderTopRightRadius="1rem";pEle.style.borderBottomRightRadius="1rem";const spanEle=document.querySelector(".box3 span");if(spanEle){spanEle.style.display="block";spanEle.style.color="#c2a77d";spanEle.style.marginLeft="-0.1px";spanEle.style.fontWeight="600";spanEle.style.backgroundColor="#454545";spanEle.style.height="15px";spanEle.style.fontStyle="italic";spanEle.style.borderBottomLeftRadius="1rem";spanEle.style.borderTopLeftRadius="1rem"}}else{pEle.removeAttribute("style");const spanEle=document.querySelector(".box3 span");if(spanEle)spanEle.removeAttribute("style")}}</script></body></html>
